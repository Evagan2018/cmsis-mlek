name: mlek audio build and execution test
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '00 20 * * 6'


jobs:
  CI:
    strategy:

      matrix:
        context: [
          {proj: kws,  build_type: Release-Live_Stream,    target_type: AVH-SSE-300,        model: FVP_Corstone_SSE-300},
          {proj: kws,  build_type: Debug-Live_Stream,      target_type: AVH-SSE-300,        model: FVP_Corstone_SSE-300},
          {proj: kws,  build_type: Release-Data_Array,     target_type: AVH-SSE-300,        model: FVP_Corstone_SSE-300},
          {proj: kws,  build_type: Debug-Data_Array,       target_type: AVH-SSE-300,        model: FVP_Corstone_SSE-300},

          {proj: kws,  build_type: Release-Live_Stream,    target_type: AVH-SSE-300-U55,    model: FVP_Corstone_SSE-300_Ethos-U55},
          {proj: kws,  build_type: Debug-Live_Stream,      target_type: AVH-SSE-300-U55,    model: FVP_Corstone_SSE-300_Ethos-U55},
          {proj: kws,  build_type: Release-Data_Array,     target_type: AVH-SSE-300-U55,    model: FVP_Corstone_SSE-300_Ethos-U55},
          {proj: kws,  build_type: Debug-Data_Array,       target_type: AVH-SSE-300-U55,    model: FVP_Corstone_SSE-300_Ethos-U55},

          {proj: kws,  build_type: Release-Live_Stream,    target_type: AVH-SSE-300-U65,    model: FVP_Corstone_SSE-300_Ethos-U65},
          {proj: kws,  build_type: Debug-Live_Stream,      target_type: AVH-SSE-300-U65,    model: FVP_Corstone_SSE-300_Ethos-U65},
          {proj: kws,  build_type: Release-Data_Array,     target_type: AVH-SSE-300-U65,    model: FVP_Corstone_SSE-300_Ethos-U65},
          {proj: kws,  build_type: Debug-Data_Array,       target_type: AVH-SSE-300-U65,    model: FVP_Corstone_SSE-300_Ethos-U65},

          {proj: kws,  build_type: Release-Live_Stream,    target_type: AVH-SSE-310,        model: FVP_Corstone_SSE-310},
          {proj: kws,  build_type: Debug-Live_Stream,      target_type: AVH-SSE-310,        model: FVP_Corstone_SSE-310},
          {proj: kws,  build_type: Release-Data_Array,     target_type: AVH-SSE-310,        model: FVP_Corstone_SSE-310},
          {proj: kws,  build_type: Debug-Data_Array,       target_type: AVH-SSE-310,        model: FVP_Corstone_SSE-310},

          {proj: kws,  build_type: Release-Live_Stream,    target_type: AVH-SSE-310-U55,    model: FVP_Corstone_SSE-310_Ethos},
          {proj: kws,  build_type: Debug-Live_Stream,      target_type: AVH-SSE-310-U55,    model: FVP_Corstone_SSE-310_Ethos},
          {proj: kws,  build_type: Release-Data_Array,     target_type: AVH-SSE-310-U55,    model: FVP_Corstone_SSE-310_Ethos},
          {proj: kws,  build_type: Debug-Data_Array,       target_type: AVH-SSE-310-U55,    model: FVP_Corstone_SSE-310_Ethos},

          {proj: kws,  build_type: Release-Live_Stream,    target_type: AVH-SSE-310-U65,    model: FVP_Corstone_SSE-310_Ethos-U65},
          {proj: kws,  build_type: Debug-Live_Stream,      target_type: AVH-SSE-310-U65,    model: FVP_Corstone_SSE-310_Ethos-U65},
          {proj: kws,  build_type: Release-Data_Array,     target_type: AVH-SSE-310-U65,    model: FVP_Corstone_SSE-310_Ethos-U65},
          {proj: kws,  build_type: Debug-Data_Array,       target_type: AVH-SSE-310-U65,    model: FVP_Corstone_SSE-310_Ethos-U65},

          {proj: kws,  build_type: Release-Live_Stream,    target_type: AVH-SSE-315,        model: FVP_Corstone_SSE-315},
          {proj: kws,  build_type: Debug-Live_Stream,      target_type: AVH-SSE-315,        model: FVP_Corstone_SSE-315},
          {proj: kws,  build_type: Release-Data_Array,     target_type: AVH-SSE-315,        model: FVP_Corstone_SSE-315},
          {proj: kws,  build_type: Debug-Data_Array,       target_type: AVH-SSE-315,        model: FVP_Corstone_SSE-315},

          {proj: kws,  build_type: Release-Live_Stream,    target_type: AVH-SSE-315-U65,    model: FVP_Corstone_SSE-315},
          {proj: kws,  build_type: Debug-Live_Stream,      target_type: AVH-SSE-315-U65,    model: FVP_Corstone_SSE-315},
          {proj: kws,  build_type: Release-Data_Array,     target_type: AVH-SSE-315-U65,    model: FVP_Corstone_SSE-315},
          {proj: kws,  build_type: Debug-Data_Array,       target_type: AVH-SSE-315-U65,    model: FVP_Corstone_SSE-315},

          {proj: kws,  build_type: Release-Live_Stream,    target_type: AVH-SSE-320,        model: FVP_Corstone_SSE-320},
          {proj: kws,  build_type: Debug-Live_Stream,      target_type: AVH-SSE-320,        model: FVP_Corstone_SSE-320},
          {proj: kws,  build_type: Release-Data_Array,     target_type: AVH-SSE-320,        model: FVP_Corstone_SSE-320},
          {proj: kws,  build_type: Debug-Data_Array,       target_type: AVH-SSE-320,        model: FVP_Corstone_SSE-320},

          {proj: kws,  build_type: Release-Live_Stream,    target_type: AVH-SSE-320-U85,    model: FVP_Corstone_SSE-320},
          {proj: kws,  build_type: Debug-Live_Stream,      target_type: AVH-SSE-320-U85,    model: FVP_Corstone_SSE-320},
          {proj: kws,  build_type: Release-Data_Array,     target_type: AVH-SSE-320-U85,    model: FVP_Corstone_SSE-320},
          {proj: kws,  build_type: Debug-Data_Array,       target_type: AVH-SSE-320-U85,    model: FVP_Corstone_SSE-320}
        ]

      fail-fast: false

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Build directory structure for ci tests
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir ci_tests
        mkdir artifacts
        cd artifacts
        runID=$(gh run list -R https://github.com/Evagan2018/cmsis-mlek --workflow build.yaml --branch main --status success --limit 1 --json databaseId -q ".[].databaseId")
        echo Show the run-id $runID
        gh run download $runID -n pack -R https://github.com/Evagan2018/cmsis-mlek
        unzip *.pack -d ./../ci_tests
        rm -f *
        unset runID

    - name: Install tools
      uses: ARM-software/cmsis-actions/vcpkg@v1
      with:
        config: "vcpkg-configuration.json"

    - name: Activate Arm tool license
      uses: ARM-software/cmsis-actions/armlm@v1

    - name: Initialize CMSIS pack root folder
      run: |
        cpackget init https://www.keil.com/pack/index.pidx
        cpackget update-index

    - name: Cache downloaded packs
      uses: actions/cache@v4
      with:
        key: cmsis-mlek-download
        path: /home/runner/.cache/arm/packs/.Download


    - name: AC6-Build-Test 4 context ${{matrix.context.proj}}.${{matrix.context.type}}+${{matrix.context.board}}
      working-directory: ./ci_tests/template/audio
      run: |
        cbuild mlek_audio.csolution.yml --update-rte --packs  --no-schema-check \
        --context ${{matrix.context.proj}}.${{matrix.context.build_type}}+${{matrix.context.target_type}} \
        --toolchain AC6 --rebuild